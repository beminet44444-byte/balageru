version: "3.9"

services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATA_DIR: /app/data
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
      CORS_ORIGINS: "*"
      FLASK_DEBUG: "0"
    volumes:
      - backend_data:/app/data   # JSON files persist here across restarts/rebuilds
    ports:
      - "5000:5000"

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "8080:80"

volumes:
  backend_data:
